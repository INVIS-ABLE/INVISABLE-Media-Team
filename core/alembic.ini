# Alembic configuration for INVISABLE OS.
#
# The database URL is resolved in migrations/env.py from the same place the app
# uses (DATABASE_URL, normalised to the sync psycopg driver; otherwise the local
# SQLite file), so `alembic upgrade head` targets exactly the app's database.
#
# Production: from core/, run `alembic upgrade head` against a fresh Postgres.
# Dev/SQLite stays zero-config (the app still create_all's on boot).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
