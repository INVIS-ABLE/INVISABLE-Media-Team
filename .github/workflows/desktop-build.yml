name: Desktop build

# Builds the INVISABLE® Media Team desktop app (Tauri).
#
# - On every push/PR that touches /desktop: type-check + cargo check (fast gate).
# - On a tag like `desktop-v0.1.0` (or manual dispatch): build the Windows
#   installer (.exe / .msi) and attach it to a draft release via tauri-action.

on:
  push:
    branches: ["**"]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"
    tags:
      - "desktop-v*"
  pull_request:
    paths:
      - "desktop/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fast checks on Linux for every change under /desktop.
  check:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libsoup-3.0-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: cargo check
        working-directory: desktop/src-tauri
        run: cargo check

  # Build the Windows installer on a tag or manual dispatch.
  build-windows:
    if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows installer (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'desktop-nightly' }}
          releaseName: "INVISABLE Media Team ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}"
          releaseDraft: true
          prerelease: false
          # Produces: "INVISABLE Media Team_x.y.z_x64-setup.exe" (NSIS) + MSI.
