name: Desktop build

# Builds the INVISABLE® Media Team desktop app (Tauri).
#
# - On every push/PR that touches /desktop: type-check + cargo check (fast gate).
# - On a tag like `desktop-v0.1.0` (or manual dispatch): build the Windows
#   installer (.exe / .msi) and attach it to a draft release via tauri-action.

on:
  push:
    branches: ["**"]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"
    tags:
      - "desktop-v*"
  pull_request:
    paths:
      - "desktop/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish (e.g. desktop-v0.1.0)"
        required: false
        default: "desktop-v0.1.0"

permissions:
  contents: write

jobs:
  # Fast checks on Linux for every change under /desktop.
  check:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libsoup-3.0-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: cargo check
        working-directory: desktop/src-tauri
        run: cargo check

  # Build the Windows installer on a tag or manual dispatch.
  build-windows:
    if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows installer + publish Release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version || 'desktop-v0.1.0' }}
          releaseName: "INVISABLE Media Team ${{ github.ref_type == 'tag' && github.ref_name || inputs.version || 'desktop-v0.1.0' }}"
          releaseBody: |
            Double-click installer for the INVISABLE® Media Team desktop app.

            Download **`INVISABLE.Media.Team_*_x64-setup.exe`** below, run it, and pick
            your role on first launch (Command Centre on the server, Studio Worker on
            the 5090). See `desktop/README.md` for setup.
          # Publish a real, full (non-draft, non-prerelease) Release so it shows on the
          # repo's front page and the "latest release" download link resolves. The tag
          # is created server-side by the runner's GITHUB_TOKEN (no local tag push
          # needed). Tagged builds and manual dispatch both publish a full release.
          releaseDraft: false
          prerelease: false
          # Produces: "INVISABLE Media Team_x.y.z_x64-setup.exe" (NSIS) + MSI.

      - name: Upload installer as a run artifact (belt-and-braces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invisable-media-windows-installer
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
